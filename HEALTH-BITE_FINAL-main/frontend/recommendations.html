<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="HealthBite - AI-Powered Personalized Food Recommendations">
    <title>HealthBite | My Recommendations</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --brand: #2563eb;
            --brand-2: #4f46e5;
            --accent: #10b981;
            --danger: #ef4444;
            --text: #0f172a;
            --muted: #64748b;
            --bg: #f8fafc;
            --card: #ffffff;
            --radius: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── Header ── */
        .top-bar {
            background: white;
            border-bottom: 1px solid #e2e8f0;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            color: var(--brand);
            letter-spacing: -1px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .back-btn:hover {
            color: var(--brand);
        }

        /* ── Hero Banner ── */
        .hero {
            background: linear-gradient(135deg, #2563eb 0%, #4f46e5 100%);
            color: white;
            padding: 50px 32px;
            text-align: center;
        }

        .hero h1 {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 16px;
            opacity: 0.85;
            max-width: 480px;
            margin: 0 auto;
        }

        /* ── Body Layout ── */
        .page-body {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px 60px;
        }

        /* ── Profile Summary Card ── */
        .profile-card {
            background: white;
            border-radius: var(--radius);
            padding: 24px 28px;
            margin-bottom: 30px;
            border: 1px solid #e2e8f0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 16px;
        }

        .profile-card .stat {
            text-align: center;
        }

        .profile-card .stat-val {
            font-size: 22px;
            font-weight: 800;
            color: var(--brand);
            letter-spacing: -1px;
        }

        .profile-card .stat-lbl {
            font-size: 11px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        /* ── Refresh Button ── */
        .btn-refresh {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0 auto 30px;
            padding: 14px 36px;
            background: var(--brand);
            color: white;
            border: none;
            border-radius: 50px;
            font-family: inherit;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.3);
            transition: all 0.3s;
        }

        .btn-refresh:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 35px rgba(37, 99, 235, 0.4);
        }

        .btn-refresh:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* ── Status Messages ── */
        #status-msg {
            text-align: center;
            font-size: 15px;
            font-weight: 600;
            color: var(--muted);
            min-height: 24px;
            margin-bottom: 24px;
        }

        #status-msg.error {
            color: var(--danger);
        }

        /* ── Recommendations Grid ── */
        .recs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .rec-card {
            background: white;
            border-radius: var(--radius);
            padding: 24px;
            border: 1px solid #e2e8f0;
            transition: all 0.3s;
            animation: fadeCard 0.4s ease both;
        }

        .rec-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 50px rgba(37, 99, 235, 0.1);
            border-color: var(--brand);
        }

        @keyframes fadeCard {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .rec-rank {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #2563eb, #4f46e5);
            color: white;
            font-size: 14px;
            font-weight: 800;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 14px;
        }

        .rec-name {
            font-size: 17px;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 8px;
        }

        .rec-reason {
            font-size: 13px;
            color: var(--muted);
            font-weight: 500;
            margin-bottom: 14px;
        }

        .match-bar-wrap {
            margin-bottom: 6px;
        }

        .match-bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .match-bar-label span:last-child {
            color: var(--accent);
        }

        .match-bar-bg {
            background: #f1f5f9;
            border-radius: 100px;
            height: 6px;
            overflow: hidden;
        }

        .match-bar-fill {
            height: 100%;
            border-radius: 100px;
            background: linear-gradient(90deg, var(--accent) 0%, #34d399 100%);
            transition: width 0.6s ease;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.5px;
            margin-top: 12px;
        }

        .badge-ml {
            background: #eef2ff;
            color: var(--brand-2);
        }

        .badge-nutrition {
            background: #ecfdf5;
            color: var(--accent);
        }

        /* ── Empty State ── */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            color: #cbd5e1;
        }

        .empty-state p {
            font-size: 16px;
        }

        /* ── Spinner ── */
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255, 255, 255, 0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <header class="top-bar">
        <span class="logo">🥗 HealthBite</span>
        <a href="user.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    </header>

    <div class="hero">
        <h1>🤖 AI Food Recommendations</h1>
        <p>Personalised suggestions powered by Machine Learning and your health profile.</p>
    </div>

    <div class="page-body">

        <!-- Profile Summary -->
        <div class="profile-card" id="profile-row">
            <!-- Populated by JS -->
        </div>

        <!-- Refresh Button -->
        <div style="text-align:center">
            <button class="btn-refresh" id="refresh-btn" onclick="loadRecommendations()">
                <i class="fas fa-brain"></i> Get Recommendations
            </button>
        </div>

        <div id="status-msg"></div>

        <!-- Results Grid -->
        <div class="recs-grid" id="recs-grid"></div>

    </div>

    <script src="script.js"></script>
    <script>
        const API_HOST = window.location.origin;

        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');
            if (!token) { window.location.href = '/index.html'; return; }
        });

        async function loadRecommendations() {
            const token = localStorage.getItem('token');
            if (!token) { window.location.href = '/index.html'; return; }

            const btn = document.getElementById('refresh-btn');
            const statusEl = document.getElementById('status-msg');
            const gridEl = document.getElementById('recs-grid');

            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div> Analysing your profile...';
            statusEl.className = '';
            statusEl.textContent = 'Fetching your health profile...';
            gridEl.innerHTML = '';

            try {
                // 1. Fetch user health profile from backend
                const profileRes = await fetch(`${API_HOST}/api/health/report`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!profileRes.ok) {
                    statusEl.className = 'error';
                    statusEl.textContent = 'No health profile found. Please complete your health setup first.';
                    btn.innerHTML = '<i class="fas fa-brain"></i> Get Recommendations';
                    btn.disabled = false;
                    return;
                }

                const profile = await profileRes.json();

                // 2. Determine health condition
                const diseases = Array.isArray(profile.disease) ? profile.disease : [];
                let healthCondition = 'normal';
                if (diseases.some(d => d.toLowerCase().includes('diabetes'))) healthCondition = 'diabetes';
                else if (diseases.some(d => d.toLowerCase().includes('hypertension'))) healthCondition = 'hypertension';

                // 3. Build request body for the ML API
                const bmi = profile.bmi || 22.5;
                const calorieTarget = healthCondition === 'diabetes' ? 1800 : (bmi > 25 ? 1900 : 2200);
                const requestBody = {
                    age: profile.age || 25,
                    gender: (profile.gender || 'male').toLowerCase(),
                    bmi: bmi,
                    activity_level: "medium",
                    diet_type: (profile.dietary_preference || 'veg').toLowerCase().replace('-', '_'),
                    goal: bmi > 27 ? 'weight_loss' : (bmi < 18.5 ? 'muscle_gain' : 'maintain'),
                    health_condition: healthCondition,
                    calorie_target: calorieTarget,
                    protein_requirement: healthCondition === 'diabetes' ? 70 : 90,
                    carbs_limit: healthCondition === 'diabetes' ? 130 : 280,
                    fat_limit: healthCondition === 'hypertension' ? 45 : 70
                };

                // Display profile summary
                displayProfileSummary(profile, bmi, healthCondition, calorieTarget);

                statusEl.textContent = 'Running ML recommendation engine...';

                // 4. Call the ML recommendation API
                const recRes = await fetch(`${API_HOST}/api/recommend-food`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify(profileData)
                });

                if (!recRes.ok) {
                    const err = await recRes.json().catch(() => ({}));
                    throw new Error(err.detail || 'Recommendation failed');
                }

                const data = await recRes.json();

                // 5. Render results
                if (!data.recommended_food || data.recommended_food.length === 0) {
                    gridEl.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><i class="fas fa-utensils"></i><p>No suitable foods found for your profile right now. Try expanding your dietary preferences.</p></div>`;
                } else {
                    renderRecommendations(data.recommended_food, data.match_details);
                }

                statusEl.textContent = `✅ Showing ${data.recommended_food.length} recommendations from today's menu.`;

            } catch (err) {
                console.error(err);
                statusEl.className = 'error';
                statusEl.textContent = `❌ Error: ${err.message}`;
            } finally {
                btn.innerHTML = '<i class="fas fa-brain"></i> Refresh Recommendations';
                btn.disabled = false;
            }
        }

        function displayProfileSummary(profile, bmi, condition, calorieTarget) {
            const row = document.getElementById('profile-row');
            row.innerHTML = `
                <div class="stat"><div class="stat-val">${profile.age || '--'}</div><div class="stat-lbl">Age</div></div>
                <div class="stat"><div class="stat-val">${(bmi).toFixed(1)}</div><div class="stat-lbl">BMI</div></div>
                <div class="stat"><div class="stat-val">${profile.dietary_preference || 'Veg'}</div><div class="stat-lbl">Diet</div></div>
                <div class="stat"><div class="stat-val">${calorieTarget}</div><div class="stat-lbl">Calorie Target</div></div>
                <div class="stat"><div class="stat-val" style="text-transform:capitalize;">${condition}</div><div class="stat-lbl">Health Status</div></div>
            `;
        }

        function renderRecommendations(foods, details) {
            const grid = document.getElementById('recs-grid');
            grid.innerHTML = '';

            foods.forEach((name, idx) => {
                const d = details && details[idx] ? details[idx] : {};
                const matchScore = d.match_score || 75;
                const healthScore = d.health_score || 75;
                const isMLMatch = d.reason && d.reason.includes('ML');
                const diabetesRisk = d.diabetes_risk || 'SAFE';
                const hbpRisk = d.hbp_risk || 'SAFE';
                const allergyRisk = d.allergy_risk || 'SAFE';
                const allergens = d.triggered_allergens || [];
                const explanation = d.explanation || '';

                const riskColor = { SAFE: '#10b981', MODERATE: '#f59e0b', RISK: '#ef4444', DANGER: '#dc2626' };
                const riskBg = { SAFE: '#ecfdf5', MODERATE: '#fffbeb', RISK: '#fef2f2', DANGER: '#fef2f2' };

                const badgeStyle = (level) =>
                    `background:${riskBg[level] || '#f1f5f9'}; color:${riskColor[level] || '#64748b'};
                     padding:4px 10px; border-radius:100px; font-size:11px; font-weight:800;`;

                const allergenHtml = allergens.length > 0
                    ? `<div style="margin-top:10px; padding:8px 12px; background:#fef2f2; border-radius:12px; font-size:12px; color:#dc2626; font-weight:700;">
                        ⚠ Allergens: ${allergens.join(', ')}
                      </div>` : '';

                const card = document.createElement('div');
                card.className = 'rec-card';
                card.style.animationDelay = `${idx * 0.08}s`;
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
                        <div class="rec-rank">#${idx + 1}</div>
                        <div style="text-align:right;">
                            <div style="font-size:22px; font-weight:900; color:${riskColor[d.overall_label || 'SAFE']}; letter-spacing:-1px;">${healthScore}</div>
                            <div style="font-size:10px; font-weight:700; color:#94a3b8; text-transform:uppercase;">Health Score</div>
                        </div>
                    </div>

                    <div class="rec-name">${name}</div>
                    <div class="rec-reason">${d.reason || 'High nutritional alignment'}</div>

                    <!-- Match Bar -->
                    <div class="match-bar-wrap" style="margin-bottom:12px;">
                        <div class="match-bar-label"><span>Match Score</span><span>${matchScore}%</span></div>
                        <div class="match-bar-bg"><div class="match-bar-fill" style="width:${matchScore}%;"></div></div>
                    </div>

                    <!-- Risk Labels -->
                    <div style="display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px;">
                        <span style="${badgeStyle(diabetesRisk)}">Diabetes: ${diabetesRisk}</span>
                        <span style="${badgeStyle(hbpRisk)}">BP: ${hbpRisk}</span>
                        ${isMLMatch ? `<span style="background:#eef2ff; color:#4f46e5; padding:4px 10px; border-radius:100px; font-size:11px; font-weight:800;"><i class="fas fa-microchip"></i> ML Match</span>` : ''}
                    </div>

                    <!-- Allergen Warning -->
                    ${allergenHtml}

                    <!-- Explanation -->
                    ${explanation ? `<div style="margin-top:10px; font-size:11px; color:#94a3b8; line-height:1.6; white-space:pre-wrap;">${explanation}</div>` : ''}
                `;
                grid.appendChild(card);
            });
        }

        // Auto-load on page entry
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(loadRecommendations, 400);
        });
    </script>

    <script src="chatbot.js"></script>
</body>

</html>
